databases:
  - name: quickbundle-db
    databaseName: quickbundle
    user: quickbundle
    plan: free

services:
  - type: web
    name: quickbundle
    env: node
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quickbundle-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        value: 09d6042335412f0c52b8643bdc976e37
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,write_products,read_orders,write_discounts,read_discounts,write_draft_orders,read_draft_orders
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_APP_URL
        sync: false
