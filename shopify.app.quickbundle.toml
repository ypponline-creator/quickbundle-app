# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "QuickBundle "
client_id = "b9b63b6521bff06d5ca47d31746e155e"
application_url = "https://ideal-smile-production-a30b.up.railway.app"
# URL akan otomatis diupdate saat npm run dev
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_discounts,read_draft_orders,read_orders,read_products,write_discounts,write_draft_orders,write_products"

[auth]
redirect_urls = [ "https://ideal-smile-production-a30b.up.railway.app/auth/callback" ]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = [
  "app/uninstalled",
  "orders/create"
]

[pos]
embedded = false
